- hosts: all
  become: yes
  vars:
    pkg_name: apache2
    service_name: apache2
  tasks:
    - apt:
        update_cache: yes

    - name: install apache2 server
      apt:
        name: "{{pkg_name}}"
        state: present

    - name: service apache2 start
      service:
        name: "{{service_name}}"
        state: started
        enabled: yes      

